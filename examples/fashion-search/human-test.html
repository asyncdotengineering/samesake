<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>samesake — aspects human test</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --text:#e6e9ef; --dim:#8b93a3; --accent:#5b9dff; }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font: 14px/1.45 -apple-system, system-ui, sans-serif; padding: 20px; }
  h1 { font-size: 17px; margin-bottom: 4px; }
  .sub { color: var(--dim); font-size: 12.5px; margin-bottom: 16px; }
  form { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  input[type=text] { flex: 1; min-width: 280px; background: var(--panel); border: 1px solid var(--line);
    color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 14px; }
  button { background: var(--accent); border: 0; color: #fff; border-radius: 8px; padding: 10px 18px;
    font-size: 14px; cursor: pointer; font-weight: 600; }
  button:disabled { opacity: .5; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip { background: var(--panel); border: 1px solid var(--line); color: var(--dim); border-radius: 999px;
    padding: 4px 10px; font-size: 12px; cursor: pointer; }
  .chip:hover { color: var(--text); border-color: var(--accent); }
  #status { color: var(--dim); font-size: 12.5px; margin: 8px 0 14px; min-height: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 14px; align-items: start; }
  .col { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
  .col h2 { font-size: 13px; margin-bottom: 2px; }
  .col .meta { color: var(--dim); font-size: 11.5px; margin-bottom: 10px; }
  .hit { display: flex; gap: 10px; padding: 8px 0; border-top: 1px solid var(--line); }
  .hit img { width: 72px; height: 92px; object-fit: cover; border-radius: 6px; background: #0a0c10; flex: none; }
  .hit .t { font-size: 12.5px; font-weight: 600; line-height: 1.3; }
  .hit .m { color: var(--dim); font-size: 11.5px; margin-top: 2px; }
  .hit a { color: inherit; text-decoration: none; }
  .hit a:hover .t { color: var(--accent); }
  .legs { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
  .leg { font-size: 10.5px; color: var(--dim); border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; }
  .leg.on { color: var(--accent); border-color: var(--accent); }
  .rank { color: var(--dim); font-size: 11px; width: 16px; flex: none; padding-top: 2px; }
  details { margin-bottom: 14px; }
  summary { color: var(--dim); font-size: 12.5px; cursor: pointer; }
  pre { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 10px;
    font-size: 11.5px; overflow-x: auto; color: var(--dim); margin-top: 6px; }
</style>
</head>
<body>
<h1>Aspects — human A/B/C</h1>
<div class="sub">Same query, three ranking configs on the live corpus. Judge with your eyes — especially style/local queries, where the text-only LLM judge can't see the products. Paste an image URL for a pure visual query (single column).</div>

<form id="f">
  <input type="text" id="q" placeholder='query — e.g. "old money aesthetic outfit" — or an image URL for visual search' autofocus>
  <button id="go">Search</button>
</form>
<div class="chips" id="chips"></div>
<div id="status"></div>
<details id="parsedBox" hidden><summary>NLQ parse / routing</summary><pre id="parsed"></pre></details>
<div class="grid" id="grid"></div>

<script>
const GOLDEN = ["red dress","old money aesthetic outfit","y2k style top","bohemian summer look",
  "what to wear to a beach wedding as a guest","office wear for women","long dress but not bodycon",
  "high waisted wide leg jeans","saree for a wedding","dinner date outfit","something light for hot weather"];
const chips = document.getElementById("chips");
for (const g of GOLDEN) {
  const b = document.createElement("span");
  b.className = "chip"; b.textContent = g;
  b.onclick = () => { document.getElementById("q").value = g; run(); };
  chips.appendChild(b);
}
const isUrl = (s) => /^https?:\/\//i.test(s.trim());
async function run() {
  const raw = document.getElementById("q").value.trim();
  if (!raw) return;
  const btn = document.getElementById("go");
  const status = document.getElementById("status");
  btn.disabled = true;
  status.textContent = "searching…";
  document.getElementById("grid").innerHTML = "";
  const param = isUrl(raw) ? "image=" + encodeURIComponent(raw) : "q=" + encodeURIComponent(raw);
  const t0 = performance.now();
  try {
    const res = await fetch("/api/search?" + param + "&limit=8");
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    status.textContent = `${Math.round(performance.now() - t0)}ms total`;
    const parsed = data.columns.find((c) => c.parsed)?.parsed;
    const pb = document.getElementById("parsedBox");
    if (parsed) { pb.hidden = false; document.getElementById("parsed").textContent = JSON.stringify(parsed, null, 2); }
    else pb.hidden = true;
    const grid = document.getElementById("grid");
    for (const col of data.columns) {
      const div = document.createElement("div");
      div.className = "col";
      div.innerHTML = `<h2>${col.label}</h2><div class="meta">${col.took_ms}ms · ${col.hits.length} hits</div>`;
      col.hits.forEach((h, i) => {
        const legs = h.legs
          ? Object.entries(h.legs).map(([n, v]) => {
              const rank = v && typeof v === "object" ? v.rank : v;
              return `<span class="leg ${rank != null ? "on" : ""}">${n}${rank != null ? ":" + rank : ""}</span>`;
            }).join("")
          : "";
        const hit = document.createElement("div");
        hit.className = "hit";
        hit.innerHTML = `<div class="rank">${i + 1}</div>
          ${h.image ? `<img loading="lazy" src="${h.image}" onerror="this.style.visibility='hidden'">` : "<div style='width:72px'></div>"}
          <div><a href="${h.url ?? "#"}" target="_blank" rel="noopener"><div class="t">${h.title}</div></a>
          <div class="m">${h.price ? "LKR " + Number(h.price).toLocaleString() : ""}${h.store ? " · " + h.store : ""}</div>
          <div class="legs">${legs}</div></div>`;
        div.appendChild(hit);
      });
      grid.appendChild(div);
    }
  } catch (e) {
    status.textContent = "error: " + e.message;
  } finally {
    btn.disabled = false;
  }
}
document.getElementById("f").addEventListener("submit", (e) => { e.preventDefault(); run(); });
</script>
</body>
</html>
